<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Productos | CommerCity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="productos">
<main class="cc-container cc-section"><div class="cc-section-title"><div><span class="cc-chip orange"><img class="cc-icon" src="assets/icons/cc-product-grid.svg" alt=""> Catálogo CommerCity</span><h1 class="text-4xl font-bold mt-3">Catálogo completo</h1><p class="cc-muted">Busca productos reales, filtra por categoría y ordena resultados del marketplace.</p></div><a class="cc-btn outline" href="carrito.html">Ir al carrito</a></div><section class="cc-card mb-6"><form class="cc-catalog-tools" data-product-filters><label class="cc-label">Buscar producto o tienda<input class="cc-input" name="q" data-product-search placeholder="Nombre, vendedor o categoría"></label><label class="cc-label">Categoría<select class="cc-select" name="categoria" data-category-filter><option value="">Todas las categorías</option></select></label><label class="cc-label">Ordenar por<select class="cc-select" name="orden" data-product-sort><option value="recent">Más recientes</option><option value="price-asc">Precio menor a mayor</option><option value="price-desc">Precio mayor a menor</option><option value="rating-desc">Mejor calificación o reputación</option></select></label><div class="cc-filter-actions"><button class="cc-btn" type="submit"><img class="cc-icon" src="assets/icons/cc-search.svg" alt="">Aplicar filtros</button><button class="cc-btn outline" type="button" data-clear-filters>Limpiar</button></div></form><p class="cc-muted mt-3" data-filter-summary>Preparando catálogo...</p></section><div class="cc-grid cols-4" data-products></div></main>
<script type="module" src="js/main.js"></script>
</body>
</html>
