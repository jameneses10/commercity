<body data-page="comprador">
<main class="cc-container cc-section cc-buyer-page"><div class="cc-section-title"><div><span class="cc-chip orange"><img class="cc-icon" src="assets/icons/cc-user-profile.svg" alt=""> Cuenta comprador</span><h1 class="text-4xl font-bold mt-3">Mi perfil</h1><p class="cc-muted">Datos personales preparados para conexión futura al perfil real.</p></div><a class="cc-btn outline" href="cuenta-privacidad.html">Cuenta y privacidad</a></div><section class="cc-grid cols-2"><article class="cc-card cc-profile-card"><div class="cc-avatar-xl"><img src="assets/icons/cc-user-avatar.svg" alt="Foto de perfil"></div><h2 class="text-2xl font-bold">Comprador CommerCity</h2><p class="cc-muted">comprador@example.com</p><p><b>Rol:</b> Comprador</p><p><b>Estado:</b> <span class="cc-chip blue">Cuenta activa</span></p><button class="cc-btn outline" type="button">Cambiar foto de perfil</button></article><article class="cc-card"><h2 class="text-2xl font-bold mb-4">Datos personales</h2><div id="profileMsg"></div><form class="cc-form cc-form-grid" novalidate data-visual-form="profileMsg"><label class="cc-label">Nombres<input class="cc-input" value="Comprador" required></label><label class="cc-label">Apellidos<input class="cc-input" value="CommerCity" required></label><label class="cc-label">Correo<input class="cc-input" type="email" value="comprador@example.com" required></label><label class="cc-label">Teléfono<input class="cc-input" value="3000000000"></label><label class="cc-label">Fecha de nacimiento<input class="cc-input" type="date"></label><label class="cc-label">Documento<input class="cc-input" placeholder="Opcional"></label><button class="cc-btn" type="submit">Guardar cambios</button></form><p class="cc-muted mt-3">Endpoint real de perfil pendiente de conexión.</p></article></section></main>
