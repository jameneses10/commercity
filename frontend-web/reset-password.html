<body data-page="reset">
<main class="cc-container cc-layout-auth"><section class="cc-auth-panel"><span class="cc-chip orange"><img class="cc-icon" src="assets/icons/cc-password-reset-unlocked.svg" alt=""> Nueva contraseña</span><h1 class="text-4xl font-bold mt-4">Restablecer contraseña</h1><p class="mt-3">Crea una contraseña segura y confirma que coincida antes de continuar.</p><div class="cc-auth-note"><b>Validación frontend</b><span>Esta pantalla queda preparada para integrarse al endpoint real de restablecimiento.</span></div></section><section class="cc-card"><h2 class="text-3xl font-bold mb-4">Define tu nueva contraseña</h2><div id="resetMsg" class="mb-3"></div><form id="resetPasswordForm" class="cc-form"><label class="cc-label">Nueva contraseña<input class="cc-input" type="password" name="password" minlength="8" required></label><label class="cc-label">Confirmar contraseña<input class="cc-input" type="password" name="confirmPassword" minlength="8" required></label><button class="cc-btn" type="submit"><img class="cc-icon" src="assets/icons/cc-secure-payment.svg" alt="">Guardar contraseña</button><div class="cc-form-links"><a class="cc-text-link cc-text-link-box" href="login.html">Volver a inicio de sesión</a></div></form></section></main>
