<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro | CommerCity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="register">
<main class="cc-container cc-layout-auth"><section class="cc-auth-panel"><h1 class="text-4xl font-bold">Crea tu cuenta</h1><p class="mt-3">Regístrate como comprador o vendedor. Para vendedores se prepara la validación de mayoría de edad.</p><div class="grid gap-3 mt-6"><div class="cc-alert ok">Compradores: pedidos, favoritos y direcciones</div><div class="cc-alert">Vendedores: tienda, productos y reputación</div></div></section><section class="cc-card"><h2 class="text-3xl font-bold mb-4">Registro</h2><div id="formMsg" class="mb-3"></div><form id="registerForm" class="cc-form"><label class="cc-label">Nombre completo<input class="cc-input" name="nombre" required></label><label class="cc-label">Correo<input class="cc-input" type="email" name="correo" required></label><label class="cc-label">Teléfono<input class="cc-input" name="telefono" inputmode="tel"></label><label class="cc-label">Fecha de nacimiento<input class="cc-input" type="date" name="fecha_nacimiento"></label><label class="cc-label">Rol<select class="cc-select" name="rol"><option value="comprador">Comprador</option><option value="vendedor">Vendedor</option></select></label><label class="cc-label">Contraseña<input class="cc-input" type="password" name="password" required></label><label class="cc-label">Confirmar contraseña<input class="cc-input" type="password" name="confirmPassword" required></label><label class="cc-check"><input type="checkbox" name="acepta_terminos" required><span>Acepto los <a class="font-bold text-blue-700" href="terms.html">términos y condiciones</a> y la <a class="font-bold text-blue-700" href="privacy.html">política de privacidad</a>.</span></label><button class="cc-btn" type="submit">Registrarme</button><p class="cc-muted">¿Ya tienes cuenta? <a class="font-bold text-blue-700" href="login.html">Inicia sesión</a></p></form></section></main>
<script type="module" src="js/main.js"></script>
<script type="module">import {initRegister} from './js/auth.js'; initRegister();</script>
</body>
</html>
