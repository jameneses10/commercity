<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommerCity UI Desktop - Marketplace Académico</title>
  <meta name="description" content="Sistema UI/UX funcional de escritorio para CommerCity con Tailwind CSS." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'Segoe UI', 'Arial', 'sans-serif'],
            display: ['Poppins', 'Inter', 'system-ui', 'sans-serif']
          },
          colors: {
            brand: { orange: '#fa8000', blue: '#2276ff' }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; }
    html.dark { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    .solid-shadow { box-shadow: 0 16px 36px #dbe1ea; }
    .soft-shadow { box-shadow: 0 8px 22px #e1e6ef; }
    .dark .solid-shadow { box-shadow: 0 16px 36px #000000; }
    .dark .soft-shadow { box-shadow: 0 8px 22px #000000; }
    .cc-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .cc-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
    .cc-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    .dark .cc-scroll::-webkit-scrollbar-track { background: #111827; }
    .dark .cc-scroll::-webkit-scrollbar-thumb { background: #475569; }
    .skeleton { background: linear-gradient(90deg, #e5e7eb, #f3f4f6, #e5e7eb); background-size: 220% 100%; animation: skeletonMove 1.1s infinite linear; }
    .dark .skeleton { background: linear-gradient(90deg, #1f2937, #334155, #1f2937); background-size: 220% 100%; }
    @keyframes skeletonMove { from { background-position: 220% 0; } to { background-position: -220% 0; } }
    .brand-word .brand-comm { color: #fa8000; }
    .brand-word .brand-city { color: #2276ff; }
    .cc-focus:focus { outline: 2px solid #fa8000; outline-offset: 2px; }
    @media print { #appHeader, .no-print { display:none!important; } main { padding-top:0!important; } }
  </style>
</head>

function addToCart(id, qty=1){ const p=productById(id); if(p.stock<=0){ toast('Stock agotado', 'Este producto no está disponible para compra.', 'error'); return; } state.cart[id] = (state.cart[id] || 0) + qty; if(state.cart[id] > p.stock) state.cart[id] = p.stock; saveLocal(); render(); toast('Carrito actualizado', `${p.name} agregado al carrito.`, 'success'); }

function toast(title, message, type='info'){
  const map = { success:['bg-green-600','check'], error:['bg-red-600','x'], warning:['bg-yellow-500','warning'], info:['bg-[#2276ff]','bell'] };
  const [bg, ic] = map[type] || map.info;
  const id = 't'+Date.now();
  const node = document.createElement('div'); node.id = id;
  node.className = 'rounded-2xl border border-[#e5e7eb] bg-white p-4 text-gray-900 soft-shadow dark:border-[#334155] dark:bg-[#111827] dark:text-gray-100';
  node.innerHTML = `<div class="flex gap-3"><div class="flex h-10 w-10 items-center justify-center rounded-xl ${bg} text-white">${icon(ic,'w-5 h-5')}</div><div class="flex-1"><p class="text-sm font-extrabold">${title}</p><p class="mt-1 text-sm text-gray-600 dark:text-slate-300">${message}</p></div><button class="text-gray-400 hover:text-gray-900 dark:hover:text-white" onclick="document.getElementById('${id}')?.remove()">${icon('x','w-4 h-4')}</button></div>`;
  document.getElementById('toastLayer').appendChild(node); setTimeout(()=>node.remove(), 4200);

function filterProducts(){
  let list = [...products];
  if(state.category && state.category !== 'Todas') list = list.filter(p=>p.category===state.category);
  if(state.search) { const s=state.search.toLowerCase(); list=list.filter(p=>p.name.toLowerCase().includes(s)||p.category.toLowerCase().includes(s)||storeName(p.storeId).toLowerCase().includes(s)); }
  if(state.sort==='precio-asc') list.sort((a,b)=>a.price-b.price);
  if(state.sort==='precio-desc') list.sort((a,b)=>b.price-a.price);
  if(state.sort==='calificacion') list.sort((a,b)=>b.rating-a.rating);
  if(state.sort==='fecha') list.sort((a,b)=>b.id-a.id);
  if(state.sort==='popularidad') list.sort((a,b)=>b.sold-a.sold);
  return list;
}

  if(r==='seller-store') body = `<div class="rounded-3xl border border-[#e5e7eb] bg-white p-6 dark:border-[#334155] dark:bg-[#111827]"><h2 class="font-display text-2xl font-bold">Mi tienda</h2><div class="mt-5 grid gap-4 md:grid-cols-2"><input value="Herramientas Norte" class="rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><input value="Activa" class="rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><textarea class="h-32 rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937] md:col-span-2">Tienda especializada en herramientas de mano y poder.</textarea></div><div class="mt-5 flex flex-wrap gap-3">${primaryBtn('Guardar tienda',"toast('Tienda','Información actualizada.','success')",'check')}${ghostBtn('Pausar tienda',"showConfirm('Pausar tienda','Los productos se ocultarán del catálogo general.',()=>toast('Tienda pausada','Estado actualizado.','warning'))",'warning')}</div></div>`;
  if(r==='seller-product-create') body = productForm();
  if(r==='seller-products') body = tableCard('Gestión de productos',['Imagen','Producto','Categoría','Precio','Stock','Estado','Acciones'],products.filter(p=>p.storeId===2).map(p=>[`<img src="${imgSvg(p.name,p.color)}" class="h-12 w-12 rounded-xl object-cover">`,p.name,p.category,money(p.price),p.stock,p.stock?badge('Activo','green'):badge('Agotado','red'),`<button class="font-bold text-[#2276ff]">Editar</button>`]));
  if(r==='seller-inventory') body = tableCard('Inventario',['Producto','Stock','Alerta','Acción'],products.filter(p=>p.storeId===2).map(p=>[p.name,p.stock,p.stock<=5?badge('Reponer','yellow'):badge('Correcto','green'),`<button onclick="toast('Stock','Stock actualizado en demo.','success')" class="font-bold text-[#2276ff]">Editar stock</button>`]));
  if(r==='seller-orders') body = tableCard('Pedidos del vendedor',['Pedido','Comprador','Productos','Total tienda','Estado','Fecha','Acciones'],[['ORD-10031','Ana Torres','Taladro Percutor',money(239900),badge('Pendiente','yellow'),'2026-06-21','Ver'],['ORD-10029','Jorge Meneses','Set destornilladores',money(45900),badge('Entregado','green'),'2026-06-18','Ver']].map(r=>[...r.slice(0,6),`<button class="font-bold text-[#2276ff]">${r[6]}</button>`]));
  if(r==='seller-shipments') body = tableCard('Envíos del vendedor',['Pedido','Paquete','Comprador','Transportadora','Guía','Estado','Acción'],[['ORD-10031','ENV-9922','Ana Torres','Servientrega','SG-8821',badge('En preparación','yellow'),`<button onclick="toast('Envío','Estado cambiado a en camino.','success')" class="font-bold text-[#2276ff]">Actualizar</button>`]]);
  if(r==='seller-returns') body = tableCard('Devoluciones del vendedor',['Solicitud','Pedido','Producto','Motivo','Estado','Acción'],[['DEV-781','ORD-10030','Taladro Percutor','Garantía',badge('En revisión','yellow'),`<button class="font-bold text-[#2276ff]">Responder</button>`]]);
  if(r==='seller-finances') body = metricGrid([['Valor bruto',money(7400000),'card'],['Comisión 10%',money(740000),'chart'],['Neto a recibir',money(6660000),'check'],['Liquidaciones','8','package']]) + `<div class="mt-6">${tableCard('Liquidaciones simuladas',['Pedido','Bruto','Comisión','Neto','Estado'],[['ORD-10031',money(239900),money(23990),money(215910),badge('Pendiente','yellow')],['ORD-10029',money(45900),money(4590),money(41310),badge('Procesada','green')]])}</div>`;
  if(r==='seller-reports') body = reportCards('vendedor');
  if(r==='seller-chat') body = chatUI();
  if(r==='seller-profile') body = profileForm('Perfil vendedor','Datos básicos del vendedor propietario de tienda.');
  return panelShell('Vendedor', sellerNav, title, subtitle, body); }
function productForm(){ return `<form class="rounded-3xl border border-[#e5e7eb] bg-white p-6 solid-shadow dark:border-[#334155] dark:bg-[#111827]"><h2 class="font-display text-2xl font-bold">Crear producto</h2><p class="mt-2 text-sm text-gray-600 dark:text-slate-300">Formulario exclusivo separado de tienda, reportes y finanzas.</p><div class="mt-5 grid gap-4 md:grid-cols-2"><input placeholder="Nombre del producto" class="rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><select class="rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]">${categories.map(c=>`<option>${c}</option>`).join('')}</select><input placeholder="Precio" type="number" class="rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><input placeholder="Stock" type="number" class="rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><textarea placeholder="Descripción" class="h-32 rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937] md:col-span-2"></textarea><div class="rounded-2xl border border-dashed border-[#e5e7eb] bg-slate-50 p-8 text-center dark:border-[#334155] dark:bg-[#1f2937] md:col-span-2">Subir múltiples imágenes</div></div><div class="mt-6 flex gap-3">${ghostBtn('Guardar borrador',"toast('Borrador','Producto guardado como borrador.','info')",'package')}${primaryBtn('Publicar producto',"toast('Producto publicado','Ya aparece en el catálogo.','success')",'check')}</div></form>`; }
function renderAdmin(){ const r=state.route; let body='', title='Panel administrador', subtitle='Administración general con responsabilidad única por sección, tablas bajo demanda, filtros, moderación y auditoría.';
  if(r==='admin-dashboard') body = metricGrid([['Usuarios totales','1.248','user'],['Tiendas activas','84','store'],['Productos activos','3.920','package'],['Comisiones',money(15400000),'chart']]) + `<div class="mt-6 grid gap-6 lg:grid-cols-2">${tableCard('Alertas importantes',['Tipo','Entidad','Estado'],[['Producto reportado','PRD-002',badge('Pendiente','yellow')],['Tienda pausada','Detalles Urbanos',badge('Revisar','red')]])}${tableCard('Actividad reciente',['Fecha','Usuario','Acción'],logs.slice(0,3).map(l=>[l.date,l.user,l.action]))}</div>`;
  if(r==='admin-users') body = tableCard('Usuarios',['Nombre','Correo','Rol','Estado','Acciones'],users.map(u=>[u.name,u.email,u.role,badge(u.status,u.status==='Activo'?'green':'yellow'),`<button onclick="toast('Usuario','Acción aplicada en demo.','success')" class="font-bold text-[#2276ff]">Gestionar</button>`]));
  if(r==='admin-stores') body = tableCard('Tiendas',['Tienda','Vendedor','Estado','Productos','Reputación','Ventas','Acciones'],stores.map(s=>[s.name,s.owner,badge(s.status,s.status==='Activa'?'green':'yellow'),s.products,badge(s.reputation,'blue'),money(s.sales),`<button onclick="setRoute('store-public',{storeId:${s.id}})" class="font-bold text-[#2276ff]">Ver</button>`]));
  if(r==='admin-products') body = tableCard('Productos admin',['Producto','Tienda','Categoría','Precio','Estado','Acciones'],products.map(p=>[p.name,storeName(p.storeId),p.category,money(p.price),p.stock?badge('Activo','green'):badge('Agotado','red'),`<button onclick="toast('Moderación','Producto ocultado en demo.','warning')" class="font-bold text-[#2276ff]">Moderar</button>`]));
  if(r==='admin-orders') body = tableCard('Pedidos admin',['Pedido','Comprador','Tienda','Pago','Envío','Total','Fecha'],demoOrders.map(o=>[o.id,'Comprador demo',o.store,badge(o.payment,o.payment==='Pagado'?'green':'red'),badge(o.status,o.status==='Entregado'?'green':'blue'),money(o.total),o.date]));
  if(r==='admin-categories') body = `<div class="grid gap-6 lg:grid-cols-[420px_1fr]"><form class="rounded-3xl border border-[#e5e7eb] bg-white p-6 dark:border-[#334155] dark:bg-[#111827]"><h2 class="font-display text-2xl font-bold">Crear categoría</h2><input placeholder="Nombre" class="mt-4 w-full rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]">${primaryBtn('Guardar categoría',"toast('Categoría','Categoría creada.','success')",'check')}</form>${tableCard('Categorías',['Categoría','Productos','Estado','Acciones'],categories.map(c=>[c,products.filter(p=>p.category===c).length,badge('Activa','green'),`<button class="font-bold text-[#2276ff]">Editar</button>`]))}</div>`;
  if(r==='admin-reports') body = reportCards('admin');
  if(r==='admin-moderation') body = tableCard('Moderación',['Tipo','Entidad','Motivo','Reportado por','Estado','Acción'],[['Producto','Taladro Percutor','Descripción incompleta','Ana Torres',badge('Pendiente','yellow'),`<button class="font-bold text-[#2276ff]">Resolver</button>`],['Mensaje','Chat #883','Lenguaje inapropiado','Sistema',badge('Revisar','red'),`<button class="font-bold text-[#2276ff]">Abrir</button>`]]);
  if(r==='admin-logs') body = tableCard('Logs / Auditoría',['Fecha','Usuario','Rol','Acción','Entidad','Resultado'],logs.map(l=>[l.date,l.user,l.user,l.action,l.entity,l.result]));
  if(r==='admin-settings') body = `<div class="grid gap-6 lg:grid-cols-2"><div class="rounded-3xl border border-[#e5e7eb] bg-white p-6 dark:border-[#334155] dark:bg-[#111827]"><h2 class="font-display text-2xl font-bold">Comisión plataforma</h2><input value="10" type="number" class="mt-4 w-full rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><p class="mt-2 text-sm text-gray-600 dark:text-slate-300">Los vendedores reciben 90% del valor aprobado.</p>${primaryBtn('Guardar comisión',"toast('Configuración','Comisión actualizada.','success')",'check')}</div><div class="rounded-3xl border border-[#e5e7eb] bg-white p-6 dark:border-[#334155] dark:bg-[#111827]"><h2 class="font-display text-2xl font-bold">Parámetros sandbox</h2>${['Pagos simulados','Webhook simulado','Auditoría activa'].map(x=>`<label class="mt-3 flex items-center justify-between rounded-2xl bg-slate-100 p-4 dark:bg-[#1f2937]"><span>${x}</span><input type="checkbox" checked></label>`).join('')}</div></div>`;
  return panelShell('Administrador', adminNav, title, subtitle, body); }
function reportCards(kind){ const title=kind==='admin'?'Reportes admin':'Reportes vendedor'; return `<div class="grid gap-5 md:grid-cols-3">${[['Ventas por período',money(12800000),'chart'],['Productos más vendidos','Audífonos Pro','package'],['Usuarios activos','842','user'],['Comisiones',money(1280000),'card'],['Stock bajo','14 productos','warning'],['Exportación','PDF / Excel','check']].map(m=>`<div class="rounded-3xl border border-[#e5e7eb] bg-white p-6 soft-shadow dark:border-[#334155] dark:bg-[#111827]"><div class="mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-100 text-[#2276ff] dark:bg-blue-950">${icon(m[2])}</div><p class="text-sm text-gray-500 dark:text-slate-400">${title}</p><h3 class="mt-2 font-display text-xl font-bold">${m[0]}</h3><p class="mt-2 text-2xl font-black text-[#fa8000]">${m[1]}</p><button onclick="toast('Exportación','Reporte exportado en demo.','success')" class="mt-4 font-bold text-[#2276ff]">Exportar</button></div>`).join('')}</div>`; }
function chatUI(){ return `<div class="grid min-h-[640px] overflow-hidden rounded-3xl border border-[#e5e7eb] bg-white solid-shadow dark:border-[#334155] dark:bg-[#111827] lg:grid-cols-[340px_1fr]"><aside class="border-r border-[#e5e7eb] p-4 dark:border-[#334155]"><input placeholder="Buscar conversación" class="mb-4 w-full rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><div class="space-y-2">${stores.slice(0,4).map((s,i)=>`<button class="w-full rounded-2xl ${i===0?'bg-orange-100 text-[#fa8000] dark:bg-orange-950':'bg-slate-100 dark:bg-[#1f2937]'} p-4 text-left"><b>${s.name}</b><span class="mt-1 block text-sm text-gray-600 dark:text-slate-300">${i?'Fuera de línea':'En línea'} · Último mensaje</span></button>`).join('')}</div></aside><section class="flex flex-col"><div class="border-b border-[#e5e7eb] p-5 dark:border-[#334155]"><h2 class="font-display text-2xl font-bold">TecnoCentro Cali</h2><p class="text-sm text-green-600 dark:text-green-300">En línea</p></div><div class="flex-1 space-y-4 bg-slate-50 p-6 dark:bg-[#020617]"><div class="max-w-md rounded-3xl bg-white p-4 dark:bg-[#1f2937]">Hola, ¿el producto tiene garantía?</div><div class="ml-auto max-w-md rounded-3xl bg-[#2276ff] p-4 text-white">Sí, tiene garantía simulada de 6 meses.</div><div class="max-w-md rounded-3xl bg-white p-4 dark:bg-[#1f2937]">Perfecto, gracias.</div></div><div class="border-t border-[#e5e7eb] p-4 dark:border-[#334155]"><div class="flex gap-3"><input placeholder="Escribe un mensaje…" class="flex-1 rounded-xl border border-[#e5e7eb] bg-white px-4 py-3 dark:border-[#334155] dark:bg-[#1f2937]"><button onclick="toast('Chat','Mensaje enviado.','success')" class="rounded-xl bg-[#fa8000] px-5 font-bold text-white">Enviar</button></div></div></section></div>`; }
function renderChat(){ return pageShell('Chat comprador-vendedor', 'Mensajería interna con conversaciones, estado en línea, reporte de mensajes y notificaciones integradas.', chatUI()); }
function renderStates(){
  const states = [ ['Carga','Skeleton sólido sin fondos borrosos','skeleton'], ['Estado vacío','No hay productos, pedidos o favoritos','empty'], ['Error','Mensaje claro y acción sugerida','error'], ['Sin conexión','Reintentar carga de datos','offline'], ['403','Acceso denegado por rol','lock'], ['Sesión expirada','Redirigir a login','user'] ];
  return pageShell('Estados globales UI', 'Componentes de carga, vacío, error, sin resultados, sin conexión, acceso denegado, sesión expirada, modales y toasts.', `<div class="grid gap-5 md:grid-cols-3">${states.map(s=>`<div class="rounded-3xl border border-[#e5e7eb] bg-white p-6 dark:border-[#334155] dark:bg-[#111827]"><div class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-orange-100 text-[#fa8000] dark:bg-orange-950">${s[2]==='skeleton'?'<div class="h-8 w-8 rounded-xl skeleton"></div>':icon(s[2]==='error'?'warning':s[2]==='lock'?'lock':s[2]==='user'?'user':'package','w-7 h-7')}</div><h3 class="font-display text-xl font-bold">${s[0]}</h3><p class="mt-2 text-sm text-gray-600 dark:text-slate-300">${s[1]}</p>${s[2]==='skeleton'?'<div class="mt-4 space-y-2"><div class="h-4 rounded-xl skeleton"></div><div class="h-4 w-2/3 rounded-xl skeleton"></div></div>':ghostBtn('Ver acción',"toast('Estado UI','Componente de estado evaluado.','info')")}</div>`).join('')}</div><div class="mt-6 grid gap-4 md:grid-cols-4"><button onclick="toast('Éxito','Acción realizada correctamente.','success')" class="rounded-2xl bg-green-600 p-4 font-bold text-white">Toast éxito</button><button onclick="toast('Error','No fue posible completar la acción.','error')" class="rounded-2xl bg-red-600 p-4 font-bold text-white">Toast error</button><button onclick="toast('Advertencia','Revisa la información antes de continuar.','warning')" class="rounded-2xl bg-yellow-500 p-4 font-bold text-white">Toast advertencia</button><button onclick="toast('Información','Mensaje informativo del sistema.','info')" class="rounded-2xl bg-[#2276ff] p-4 font-bold text-white">Toast info</button></div>`); }
function emptyState(title, message, actionLabel, action){ return `<div class="rounded-3xl border border-[#e5e7eb] bg-white p-10 text-center solid-shadow dark:border-[#334155] dark:bg-[#111827]"><div class="mx-auto flex h-16 w-16 items-center justify-center rounded-3xl bg-orange-100 text-[#fa8000] dark:bg-orange-950">${icon('package','w-8 h-8')}</div><h2 class="mt-5 font-display text-2xl font-bold">${title}</h2><p class="mx-auto mt-2 max-w-lg text-sm leading-6 text-gray-600 dark:text-slate-300">${message}</p><div class="mt-6">${primaryBtn(actionLabel,action,'search')}</div></div>`; }
function tableCard(title, headers, rows){ return `<div class="overflow-hidden rounded-3xl border border-[#e5e7eb] bg-white solid-shadow dark:border-[#334155] dark:bg-[#111827]"><div class="flex flex-col gap-3 border-b border-[#e5e7eb] p-5 dark:border-[#334155] md:flex-row md:items-center md:justify-between"><h2 class="font-display text-xl font-bold">${title}</h2><div class="flex gap-2"><input placeholder="Buscar…" class="rounded-xl border border-[#e5e7eb] bg-white px-3 py-2 text-sm dark:border-[#334155] dark:bg-[#1f2937]"><button class="rounded-xl bg-[#2276ff] px-4 text-sm font-bold text-white">Filtrar</button></div></div><div class="overflow-x-auto cc-scroll"><table class="w-full min-w-[780px] text-left text-sm"><thead class="bg-slate-100 text-xs uppercase tracking-wider text-gray-600 dark:bg-[#1f2937] dark:text-slate-300"><tr>${headers.map(h=>`<th class="px-5 py-4 font-extrabold">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t border-[#e5e7eb] dark:border-[#334155]">${r.map(c=>`<td class="px-5 py-4 align-middle">${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div><div class="flex items-center justify-between border-t border-[#e5e7eb] p-4 text-sm text-gray-600 dark:border-[#334155] dark:text-slate-300"><span>${rows.length} registros</span><div class="flex gap-2"><button class="rounded-lg border border-[#e5e7eb] px-3 py-1 dark:border-[#334155]">Anterior</button><button class="rounded-lg bg-[#fa8000] px-3 py-1 font-bold text-white">1</button><button class="rounded-lg border border-[#e5e7eb] px-3 py-1 dark:border-[#334155]">Siguiente</button></div></div></div>`; }
function render(){
  document.getElementById('appHeader').innerHTML = renderHeader();
  let html='';
  const r=state.route;
  if(r==='home') html=renderHome();
  else if(r==='catalog') html=renderCatalog();
  else if(r==='categories') html=renderCategories();
  else if(r==='search') html=renderCatalog('Resultados de búsqueda', `Resultados para “${state.search || 'todos'}” con filtros, sugerencias y ordenamiento.`);
  else if(r==='product-detail') html=renderProductDetail();
  else if(r==='store-public') html=renderStorePublic();
  else if(r==='register') html=renderAuth('register');
  else if(r==='login') html=renderAuth('login');
  else if(r==='recover') html=renderAuth('recover');
  else if(r==='favorites') html=renderFavorites();
  else if(r==='cart') html=renderCart();
  else if(r==='checkout') html=renderCheckout('checkout');
  else if(r==='sandbox-payment') html=renderCheckout('sandbox-payment');
  else if(r==='receipt') html=renderCheckout('receipt');
  else if(r==='orders') html=renderOrders();
  else if(r==='order-detail') html=renderOrderDetail();
  else if(r==='tracking') html=renderTracking();
  else if(r==='returns') html=renderReturns();
  else if(r==='reviews') html=renderReviews();
  else if(r==='notifications') html=renderNotifications();
  else if(r.startsWith('account-')) html=renderAccount();
  else if(r.startsWith('seller-')) html=renderSeller();
  else if(r.startsWith('admin-')) html=renderAdmin();
  else if(r==='chat') html=renderChat();
  else if(r==='states') html=renderStates();
  else html=renderHome();
  document.getElementById('app').innerHTML = html;
}
render();
</script>
</body>
</html>
